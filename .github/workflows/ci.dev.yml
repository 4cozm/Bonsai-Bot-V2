name: CI (dev)

# dev 브랜치에 반영될 때(머지 후 1번)만 실행해서 base 커버리지를 축적
on:
    push:
        branches: ["dev"]

jobs:
    test-and-coverage:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout (dev)
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "npm"

            - run: npm ci

            - name: Prettier check
              run: npm run format:check

            - name: ESLint
              run: npm run lint

            - name: Test + Coverage
              run: npm run test:cov

            - name: Upload coverage to Codecov (dev base)
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: ./coverage/lcov.info
                  fail_ci_if_error: true
                  verbose: true
